<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grounded and Free Barista Pro</title>
    <style>
        /* Hippie / Earthy Aesthetic */
        :root {
            --cream: #f9f4e8;
            --terracotta: #d67d5c;
            --sage: #8a9a5b;
            --coffee: #4e342e;
            --gold: #e9b44c;
        }

        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--cream); 
            color: var(--coffee); 
            margin: 0; 
            padding: 20px;
            /* Decorative Boho Patterns */
            background-image: radial-gradient(var(--terracotta) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-opacity: 0.1;
        }

        .header {
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 2em; 
            margin: 0; 
            letter-spacing: 2px;
            color: var(--terracotta);
            text-shadow: 1px 1px 0px var(--cream), 2px 2px 0px var(--coffee);
        }

        .brand {
            font-style: italic;
            font-weight: bold;
            color: var(--sage);
            margin-bottom: 10px;
        }

        canvas { 
            border: 8px solid var(--terracotta); 
            background: #fff; 
            cursor: pointer; 
            border-radius: 50% 50% 15px 15px; /* Rounded top like a coffee pod */
            box-shadow: 0 10px 0 var(--coffee);
            max-width: 90%;
            height: auto; 
        }

        .ui { margin-top: 25px; }

        #msg { 
            font-weight: bold; 
            font-size: 1.4em; 
            height: 40px;
            padding: 10px;
            border-radius: 10px;
        }

        button {
            background-color: var(--sage);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
            display: none; /* Hidden until perfect shot */
            box-shadow: 0 4px 0 #5c683d;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #5c683d; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">Grounded and Free</div>
        <h1>Barista Pro</h1>
    </div>

    <p>Phase 1: The Soul of the Cup<br>Tap to pull a <b>Perfect Espresso Shot</b></p>

    <canvas id="gameCanvas" width="400" height="300"></canvas>

    <div class="ui">
        <div id="msg">WAITING FOR TAMP...</div>
        <button id="nextBtn" onclick="nextPhase()">Proceed to Steaming ➔</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let angle = 0, speed = 0.05, running = true;

    function draw() {
        ctx.clearRect(0, 0, 400, 300);
        
        // Stylish Background Circle for Meter
        ctx.beginPath(); ctx.arc(200, 250, 160, Math.PI, 0);
        ctx.fillStyle = '#fdfbf7'; ctx.fill();

        // Meter Arc (The Gauge)
        ctx.beginPath(); ctx.arc(200, 250, 140, Math.PI, 0);
        ctx.lineWidth = 25; ctx.strokeStyle = '#e0e0e0'; ctx.stroke();

        // Hippie Gold Zone
        ctx.beginPath(); ctx.arc(200, 250, 140, -Math.PI + 1.3, -Math.PI + 1.7);
        ctx.strokeStyle = '#e9b44c'; ctx.stroke();

        // Needle
        ctx.save(); ctx.translate(200, 250); ctx.rotate(-Math.PI + angle);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(130, 0);
        ctx.lineWidth = 8; ctx.lineCap = "round";
        ctx.strokeStyle = '#4e342e'; ctx.stroke(); ctx.restore();

        if (running) {
            angle += speed;
            if (angle > Math.PI || angle < 0) speed = -speed;
        }
        requestAnimationFrame(draw);
    }

    function checkShot() {
        if (!running) return;
        running = false;
        const msg = document.getElementById('msg');
        if (angle >= 1.3 && angle <= 1.7) {
            msg.innerHTML = "✨ PURE MAGIC! Perfect Crema.";
            msg.style.color = "#8a9a5b";
            document.getElementById('nextBtn').style.display = "inline-block";
        } else {
            msg.innerHTML = "TOO BITTER... Try Again, Friend.";
            msg.style.color = "#d67d5c";
            setTimeout(() => { 
                running = true; 
                msg.innerHTML = "WAITING FOR TAMP..."; 
                msg.style.color = "#4e342e"; 
            }, 1500);
        }
    }

    function nextPhase() {
        alert("Phase 2: Milk Steaming is coming next! Save this file to your GitHub now.");
    }

    canvas.addEventListener('mousedown', checkShot);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); checkShot(); });
    draw();
</script>
</body>
</html>
