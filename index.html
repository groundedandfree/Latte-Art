<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grounded and Free Barista Pro</title>
    <style>
        :root {
            --site-red: #a33b39; /* Matches your site header */
            --cream: #f9f4e8;
            --coffee: #4e342e;
            --gold: #e9b44c;
        }

        body { 
            text-align: center; 
            font-family: sans-serif; 
            background-color: var(--cream); 
            color: var(--coffee); 
            margin: 0; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* This container prevents the "zoomed in" look */
        .game-container {
            width: 100%;
            max-width: 350px; /* Fits perfectly on most phones */
            margin: 0 auto;
        }

        h1 { 
            font-size: 1.8em; 
            margin: 5px 0; 
            color: var(--site-red);
            text-transform: uppercase;
        }

        .brand {
            font-weight: bold;
            color: var(--coffee);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        canvas { 
            border: 6px solid var(--site-red); 
            background: #fff; 
            cursor: pointer; 
            border-radius: 20px;
            box-shadow: 0 8px 0 #7a2c2a;
            width: 100%; /* Scales to the container */
            height: auto; 
        }

        #msg { 
            font-weight: bold; 
            font-size: 1.1em; 
            margin-top: 15px;
            min-height: 25px;
        }

        button {
            background-color: var(--site-red);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 30px;
            margin-top: 10px;
            display: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="brand">GROUNDED AND FREE</div>
        <h1>Barista Pro</h1>
        <p style="font-size: 0.9em;">Phase 1: Tap to pull a <b>Perfect Shot</b></p>

        <canvas id="gameCanvas" width="400" height="300"></canvas>

        <div id="msg">WAITING FOR TAMP...</div>
        <button id="nextBtn" onclick="alert('Phase 2 Loading...')">Next: Steam Milk ➔</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let angle = 0, speed = 0.05, running = true;

    function draw() {
        ctx.clearRect(0, 0, 400, 300);
        
        // Gauge Background
        ctx.beginPath(); ctx.arc(200, 250, 140, Math.PI, 0);
        ctx.lineWidth = 25; ctx.strokeStyle = '#eeeeee'; ctx.stroke();

        // Gold Zone
        ctx.beginPath(); ctx.arc(200, 250, 140, -Math.PI + 1.3, -Math.PI + 1.7);
        ctx.strokeStyle = '#e9b44c'; ctx.stroke();

        // Needle
        ctx.save(); ctx.translate(200, 250); ctx.rotate(-Math.PI + angle);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(130, 0);
        ctx.lineWidth = 8; ctx.lineCap = "round";
        ctx.strokeStyle = '#4e342e'; ctx.stroke(); ctx.restore();

        if (running) {
            angle += speed;
            if (angle > Math.PI || angle < 0) speed = -speed;
        }
        requestAnimationFrame(draw);
    }

    function checkShot() {
        if (!running) return;
        running = false;
        if (angle >= 1.3 && angle <= 1.7) {
            document.getElementById('msg').innerHTML = "✨ PERFECT CREMA!";
            document.getElementById('msg').style.color = "green";
            document.getElementById('nextBtn').style.display = "inline-block";
        } else {
            document.getElementById('msg').innerHTML = "TOO BITTER! Try again.";
            document.getElementById('msg').style.color = "#a33b39";
            setTimeout(() => { 
                running = true; 
                document.getElementById('msg').innerHTML = "WAITING FOR TAMP...";
                document.getElementById('msg').style.color = "#4e342e";
            }, 1500);
        }
    }

    canvas.addEventListener('mousedown', checkShot);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); checkShot(); });
    draw();
</script>
</body>
</html>
